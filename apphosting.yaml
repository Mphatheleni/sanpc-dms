# Firebase App Hosting configuration
# See https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0

env:
  # App URL — update to your deployed backend URL once known
  - variable: APP_URL
    value: https://sanpc-dms--sanpc-dms.us-east4.hosted.app
    availability:
      - RUNTIME

  # Azure AD
  - variable: AZURE_TENANT_ID
    value: 5ed07a76-3277-4f9d-b22f-ac0be6003372
    availability:
      - RUNTIME

  - variable: AZURE_CLIENT_ID
    value: debfbbee-faa2-44fb-9231-582bf9130ca8
    availability:
      - RUNTIME

  # Email sender address
  - variable: MAIL_SENDER
    value: mphatheleni.matidze@sa-npc.co.za
    availability:
      - RUNTIME

  # Secrets (stored in Cloud Secret Manager via firebase apphosting:secrets:set)
  - variable: JWT_SECRET
    secret: JWT_SECRET
    availability:
      - RUNTIME

  - variable: AZURE_CLIENT_SECRET
    secret: AZURE_CLIENT_SECRET
    availability:
      - RUNTIME

  - variable: MAIL_PASSWORD
    secret: MAIL_PASSWORD
    availability:
      - RUNTIME

  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - BUILD
      - RUNTIME
