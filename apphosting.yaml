# Firebase App Hosting configuration
# See https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0

env:
  # App URL — update to your deployed backend URL once known
  - variable: APP_URL
    value: https://sanpc-dms--sanpc-dms.us-east4.hosted.app
    availability:
      - RUNTIME

  # Azure AD
  - variable: AZURE_TENANT_ID
    value: 5ed07a76-3277-4f9d-b22f-ac0be6003372
    availability:
      - RUNTIME

  - variable: AZURE_CLIENT_ID
    value: debfbbee-faa2-44fb-9231-582bf9130ca8
    availability:
      - RUNTIME

  # SharePoint Document Storage
  - variable: SHAREPOINT_SITE_ID
    value: "sanpc00.sharepoint.com,8c205f81-186d-48c3-b4bb-449965d37af9,740f165f-f39c-44be-89f7-4c4118351e67"
    availability:
      - RUNTIME

  - variable: SHAREPOINT_DRIVE_ID
    value: "b!gV8gjG0Yw0i0u0SZZdN6-V8WD3Sc875EifdMQRg1Hme802rZTalMSpD8kO-llB1S"
    availability:
      - RUNTIME

  - variable: SHAREPOINT_FOLDER
    value: "DMS-Archive"
    availability:
      - RUNTIME

  # Email sender address
  - variable: MAIL_SENDER
    value: mphatheleni.matidze@sa-npc.co.za
    availability:
      - RUNTIME

  # Secrets (stored in Cloud Secret Manager via firebase apphosting:secrets:set)
  - variable: JWT_SECRET
    secret: JWT_SECRET
    availability:
      - RUNTIME

  - variable: AZURE_CLIENT_SECRET
    secret: AZURE_CLIENT_SECRET
    availability:
      - RUNTIME

  - variable: MAIL_PASSWORD
    secret: MAIL_PASSWORD
    availability:
      - RUNTIME

  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - BUILD
      - RUNTIME

  - variable: POWER_AUTOMATE_URL
    secret: POWER_AUTOMATE_URL
    availability:
      - RUNTIME

  - variable: POWER_AUTOMATE_EMAIL_URL
    secret: POWER_AUTOMATE_EMAIL_URL
    availability:
      - RUNTIME
